experiment_name: xgb_fe_v2

features: v2   # pruned top-27 features (importance > 0.003 from xgb_fe_v1)

data:
  target_col: "Heart Disease"
  drop_cols: [id]

model: xgboost
hyperparams:
  n_estimators: 500
  learning_rate: 0.05
  max_depth: 6
  subsample: 0.8
  colsample_bytree: 0.8
  random_state: 42

cv:
  n_splits: 5

wandb:
  project: playground-series-s6e2
